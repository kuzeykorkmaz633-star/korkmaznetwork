<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Korkmaz Network | Minecraft Sunucusu</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #0d0d0d;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }

        .background-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(139, 0, 0, 0.15) 0%, rgba(0, 0, 0, 0.9) 80%);
            z-index: 1;
        }

        .container {
            text-align: center;
            z-index: 2;
            padding: 20px;
        }

        h1 {
            font-size: 4rem;
            font-weight: 900;
            letter-spacing: 5px;
            color: #ff0000;
            text-shadow: 0 0 20px rgba(255, 0, 0, 0.6), 0 0 40px rgba(139, 0, 0, 0.4);
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        p {
            font-size: 1.5rem;
            color: #cccccc;
            margin-bottom: 40px;
            font-weight: 300;
        }

        .btn-container {
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        .btn {
            display: inline-block;
            padding: 15px 35px;
            font-size: 1.1rem;
            font-weight: 600;
            text-decoration: none;
            color: #ffffff;
            border-radius: 5px;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.5);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-discord {
            background-color: #5865F2;
        }

        .btn-discord:hover {
            background-color: #4752C4;
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(88, 101, 242, 0.4);
        }

        .footer {
            position: absolute;
            bottom: 20px;
            font-size: 0.9rem;
            color: #555555;
            z-index: 2;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="background-overlay"></div>

    <div class="container">
        <h1>Korkmaz Network</h1>
        <p>IP Adresi Büyük Açılışta Aktif Olacak!</p>
        
        <div class="btn-container">
            <a href="https://discord.gg/Tx9Ffxv3h" target="_blank" class="btn btn-discord">Discord'a Katıl</a>
        </div>
    </div>

    <div class="footer">
        &copy; 2026 Korkmaz Network. Tüm Hakları Saklıdır.
    </div>

</body>
</html>
